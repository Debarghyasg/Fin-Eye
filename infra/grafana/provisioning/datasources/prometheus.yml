## Grafana datasource provisioning — auto-loaded on container start.
## The `name: Prometheus` is what dashboard JSON refers to in `datasource.uid`.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
