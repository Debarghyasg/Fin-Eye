# Alembic configuration file.
# The only value that matters here is sqlalchemy.url — we override it
# dynamically in env.py from Pydantic settings, so this is a fallback only.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback URL — overridden by env.py at runtime
sqlalchemy.url = postgresql+psycopg2://finsight:finsight_dev@localhost:5432/finsight

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
