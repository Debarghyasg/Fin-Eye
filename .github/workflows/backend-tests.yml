name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  pytest:
    name: pytest + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # The full requirements.txt pulls torch/transformers/chromadb (~2 GB).
      # Unit + integration tests stub those services — install only what we
      # need at module-import time so CI stays fast.
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            'fastapi==0.111.0' \
            'uvicorn[standard]==0.29.0' \
            'python-multipart==0.0.9' \
            'sqlalchemy[asyncio]==2.0.30' \
            'aiosqlite==0.20.0' \
            'pydantic==2.7.1' \
            'pydantic-settings==2.3.0' \
            'python-jose[cryptography]==3.3.0' \
            'httpx==0.27.0' \
            'structlog==24.1.0' \
            'tenacity==8.3.0' \
            'aiofiles==23.2.1' \
            'python-dotenv==1.0.1' \
            'boto3==1.34.110' \
            'pytest==8.2.0' \
            'pytest-asyncio==0.23.6' \
            'pytest-cov==5.0.0' \
            'rank-bm25==0.2.2' \
            'redis[hiredis]==5.0.6' \
            'numpy<2.0'

      - name: Run pytest with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          ENVIRONMENT: development
          GROQ_API_KEY: ""
          CLERK_SECRET_KEY: stub
          CLERK_PUBLISHABLE_KEY: stub
        run: |
          pytest \
            --cov=app \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          if-no-files-found: ignore
