version: "3.9"

# ════════════════════════════════════════════════════════════════
#  FinSight AI — 100% FREE local development stack (PR 2)
#
#  Services
#  ────────
#  db          PostgreSQL 16     → 5432
#  redis       Redis 7           → 6379    (cache only — NOT a broker)
#  rabbitmq    RabbitMQ 3 mgmt   → 5672 / 15672  (Celery broker + management UI)
#  qdrant      Qdrant 1.12       → 6333    (vector store — native dense + BM25 sparse)
#  api         FastAPI           → 8000
#  worker      Celery worker     → (no port; consumes RabbitMQ)
#  beat        Celery Beat       → (no port; schedules EDGAR poll)
#  flower      Celery monitor    → 5555    (management UI for Celery, profile=monitor)
#  localstack  LocalStack 3      → 4566    (optional S3/SQS mock, profile=aws)
#
#  Bring everything up:
#    docker-compose up
#
#  Bring up the lean dev set (no Flower / LocalStack):
#    docker-compose up db redis rabbitmq qdrant api worker
#
#  Add Celery monitoring (Flower):
#    docker-compose --profile monitor up
# ════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: finsight_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (cache only — Celery uses RabbitMQ) ──────────────
  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── RabbitMQ (durable Celery broker — replaces Redis-as-broker) ──
  # PDF §0: Redis is a cache, not a broker. RabbitMQ is the open-source
  # analog to AWS SQS — durable, dead-letter-aware, ack/nack semantics.
  rabbitmq:
    image: rabbitmq:3-management
    container_name: finsight_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-finsight}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-finsight_dev}
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Qdrant (vector store — replaces ChromaDB) ──────────────
  # Native hybrid search: dense (MiniLM 384-d) + BM25 sparse in one query.
  # Production swap: change QDRANT_URL + QDRANT_API_KEY to Pinecone Serverless.
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: finsight_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"      # HTTP API
      - "6334:6334"      # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # /readyz returns 200 once the collection store is loaded
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      LOCAL_STORAGE_PATH: /app/uploads
      USE_S3: "false"
      USE_SQS: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - hf_cache:/app/.cache         # share HF model cache with workers
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ── Celery worker (consumes RabbitMQ) ───────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      LOCAL_STORAGE_PATH: /app/uploads
      USE_S3: "false"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads          # share uploads dir with the API
      - hf_cache:/app/.cache
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # --concurrency=1 because each worker holds a SentenceTransformer + spaCy
    # model in RAM (~250 MB). Scale with --scale worker=N rather than threads.
    command: >
      celery -A app.services.celery_app worker
      -l info
      --concurrency=1
      -Q finsight

  # ── Celery Beat (schedules EDGAR poll) ──────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      USE_EDGAR_POLLER: "true"
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      celery -A app.services.celery_app beat
      -l info
      --schedule=/tmp/celerybeat-schedule

  # ── Flower (Celery monitoring, optional) ────────────────────
  flower:
    image: mher/flower:2.0
    container_name: finsight_flower
    restart: unless-stopped
    profiles: ["monitor"]
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      FLOWER_PORT: "5555"
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── LocalStack (optional mock AWS — only when USE_S3=true) ──
  localstack:
    image: localstack/localstack:3
    container_name: finsight_localstack
    profiles: ["aws"]
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: us-east-1
      DEBUG: 0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  pgdata:
  qdrant_data:
  rabbitmq_data:
  uploads:
  hf_cache:
  localstack_data:
