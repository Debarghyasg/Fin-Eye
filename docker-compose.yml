version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: finsight_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live-reload in dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ── Redis (BM25 index cache) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── LocalStack (mock AWS S3 + SQS for local dev) ───────────────
  localstack:
    image: localstack/localstack:3
    container_name: finsight_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,comprehend
      DEFAULT_REGION: us-east-1
      DEBUG: 0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  pgdata:
  localstack_data:
