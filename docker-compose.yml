# ════════════════════════════════════════════════════════════════
#  FinSight AI — 100% FREE local development stack (PR 1 + PR 2 + PR 3)
#
#  Services
#  ────────
#  db          PostgreSQL 16     → 5432
#  redis       Redis 7           → 6379    (cache only — NOT a broker)
#  rabbitmq    RabbitMQ 3 mgmt   → 5672 / 15672 / 15692  (Celery broker + UI + Prom)
#  qdrant      Qdrant 1.12       → 6333    (vector store — native dense + BM25 sparse)
#  seaweedfs   SeaweedFS 3.69    → 8333    (S3-compatible object storage, replaces local FS)
#  mailhog     Mailhog 1.0       → 1025 / 8025  (SMTP capture + web UI)
#  prometheus  Prometheus 2.54   → 9090    (metrics scraper)
#  grafana     Grafana 11        → 3001    (provisioned FinSight dashboard)
#  api         FastAPI           → 8000    (exposes /metrics for Prometheus)
#  worker      Celery worker     → (no port; consumes RabbitMQ)
#  beat        Celery Beat       → (no port; schedules EDGAR poll)
#  flower      Celery monitor    → 5555    (profile=monitor)
#  localstack  LocalStack 3      → 4566    (profile=aws — only when USE_S3=true with real AWS API)
#
#  Bring everything up:
#    docker-compose up
#
#  Lean dev set (no observability containers):
#    docker-compose up db redis rabbitmq qdrant seaweedfs mailhog api worker
#
#  Observability profile (Prometheus + Grafana + Flower):
#    docker-compose --profile monitor up
# ════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: finsight_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (cache only — Celery uses RabbitMQ) ──────────────
  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── RabbitMQ (durable Celery broker — replaces Redis-as-broker) ──
  # Port 15692 exposes the built-in Prometheus exporter (enabled by default
  # since RabbitMQ 3.8 in the management image).
  rabbitmq:
    image: rabbitmq:3-management
    container_name: finsight_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-finsight}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-finsight_dev}
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # management UI (http://localhost:15672)
      - "15692:15692"    # Prometheus metrics (PR 3)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Qdrant (vector store — replaces ChromaDB) ──────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: finsight_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"      # HTTP API (also serves /metrics for Prometheus)
      - "6334:6334"      # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant image is distroless — no wget/curl, so we rely on
    # Compose's `service_started` dependency instead of a healthcheck.

  # ── SeaweedFS (S3-compatible object storage — replaces MinIO) ──
  # PDF §0: MinIO Community archived Feb 2026. SeaweedFS is Apache 2.0,
  # actively maintained since 2012, full S3 API. boto3 calls work unchanged.
  # Single-binary `weed server -s3` runs master + volume + filer + S3 gateway.
  seaweedfs:
    image: chrislusf/seaweedfs:3.69
    container_name: finsight_seaweedfs
    restart: unless-stopped
    ports:
      - "8333:8333"      # S3 API (boto3 endpoint URL)
      - "9333:9333"      # master HTTP UI / cluster status
      - "8888:8888"      # filer HTTP
    volumes:
      - seaweedfs_data:/data
    command: >
      server
      -dir=/data
      -s3
      -s3.port=8333
      -filer
      -master.volumeSizeLimitMB=1024
    # SeaweedFS image lacks wget/curl, so we rely on `service_started`
    # for dependents rather than a healthcheck.

  # ── Mailhog (dev SMTP capture — replaces SES in dev) ──────
  # Zero-config: no auth, port 1025 SMTP, port 8025 web UI.
  # The unified email service in app/services/email.py routes to it
  # when SMTP_HOST=mailhog (default in .env.example).
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: finsight_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # web UI (http://localhost:8025)

  # ── Prometheus (metrics scraper) ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: finsight_prometheus
    restart: unless-stopped
    profiles: ["monitor"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Grafana (provisioned FinSight dashboard) ────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: finsight_grafana
    restart: unless-stopped
    profiles: ["monitor"]
    ports:
      - "3001:3000"      # 3001 host so it doesn't clash with Next.js on 3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── FastAPI backend ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      LOCAL_STORAGE_PATH: /app/uploads
      USE_S3: "false"
      USE_SEAWEEDFS: "true"
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      USE_SQS: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      ENABLE_PROMETHEUS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads             # legacy local-fs fallback
      - hf_cache:/app/.cache             # share HF model cache with workers
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      seaweedfs:
        condition: service_started
    # Run Alembic migrations on every start, then launch the API.
    # Idempotent: if schema is already at HEAD, alembic is a no-op (~200 ms).
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload"

  # ── Celery worker (consumes RabbitMQ) ───────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      LOCAL_STORAGE_PATH: /app/uploads
      USE_S3: "false"
      USE_SEAWEEDFS: "true"
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - hf_cache:/app/.cache
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      seaweedfs:
        condition: service_started
    # --concurrency=1 because each worker holds a SentenceTransformer + spaCy
    # model in RAM (~250 MB). Scale with --scale worker=N rather than threads.
    command: >
      celery -A app.services.celery_app worker
      -l info
      --concurrency=1
      -Q finsight

  # ── Celery Beat (schedules EDGAR poll) ──────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_dev}@db:5432/${POSTGRES_DB:-finsight}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      USE_EDGAR_POLLER: "true"
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      celery -A app.services.celery_app beat
      -l info
      --schedule=/tmp/celerybeat-schedule

  # ── Flower (Celery monitoring, optional) ────────────────────
  flower:
    image: mher/flower:2.0
    container_name: finsight_flower
    restart: unless-stopped
    profiles: ["monitor"]
    environment:
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-finsight}:${RABBITMQ_DEFAULT_PASS:-finsight_dev}@rabbitmq:5672//
      FLOWER_PORT: "5555"
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── LocalStack (optional mock AWS — only when targeting real AWS API) ──
  localstack:
    image: localstack/localstack:3
    container_name: finsight_localstack
    profiles: ["aws"]
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEFAULT_REGION: us-east-1
      DEBUG: 0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  pgdata:
  qdrant_data:
  rabbitmq_data:
  seaweedfs_data:
  prometheus_data:
  grafana_data:
  uploads:
  hf_cache:
  localstack_data:
