<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Black background -->
  <rect width="400" height="400" fill="#000000"/>

  <defs>
    <linearGradient id="finBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#b8cdd6"/>
      <stop offset="50%" stop-color="#7a98a6"/>
      <stop offset="100%" stop-color="#4d6878"/>
    </linearGradient>
    <linearGradient id="waveBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#7a98a6"/>
      <stop offset="100%" stop-color="#5a7686"/>
    </linearGradient>
  </defs>

  <!-- Shark fin (curved, leaning right, centred) -->
  <path
    d="M 178 198 C 188 162, 210 130, 240 110
       C 232 138, 226 168, 226 196
       C 226 206, 222 212, 212 214 Z"
    fill="url(#finBlue)"
    stroke="#000000"
    stroke-width="1.5"
  />

  <!-- Wave underneath the fin -->
  <path
    d="M 130 222
       C 158 214, 186 232, 214 222
       C 240 214, 260 230, 280 222
       L 280 234
       C 260 242, 240 226, 214 234
       C 186 242, 158 226, 130 234 Z"
    fill="url(#waveBlue)"
    stroke="#000000"
    stroke-width="1"
  />

  <!-- Fin-Sight wordmark — white serif, centred below mark -->
  <text
    x="200"
    y="320"
    text-anchor="middle"
    font-family="'Cinzel', 'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="60"
    font-weight="600"
    fill="#ffffff"
    letter-spacing="2"
  >Fin-Sight</text>
</svg>
